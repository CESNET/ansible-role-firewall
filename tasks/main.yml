---
- name: "Debian version check ({{ ansible_facts['distribution_major_version'] }})"
  assert:
    that:
      - ansible_facts['distribution'] == "Debian"
      - ansible_facts['distribution_major_version'] is version('10','>=')
    fail_msg: "Required version is 10+, this is {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}"
    quiet: true

- name: "install firewall"
  when: firewall_do_install
  include_tasks:
    file: "firewall_install_iptables.yml"
    apply:
      tags:
        - firewall
  tags:
    - firewall

- name: "configure firewall"
  when: firewall_do_config
  include_tasks:
    file: "firewall_config_iptables.yml"
    apply:
      tags:
        - firewall
  tags:
    - firewall
